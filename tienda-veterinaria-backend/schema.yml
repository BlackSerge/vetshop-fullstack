openapi: 3.0.3
info:
  title: Tienda Veterinaria API
  version: 1.0.0
  description: API para e-commerce veterinario integral con catálogo de productos,
    carrito, checkout y procesamiento de pagos con Stripe (incluyendo webhooks).
paths:
  /api/carrito/cart/:
    get:
      operationId: carrito_cart_retrieve
      description: Recupera el carrito actual o crea uno anónimo.
      tags:
      - carrito
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
    post:
      operationId: carrito_cart_create
      description: Añade un producto al carrito.
      tags:
      - carrito
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemMutation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CartItemMutation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CartItemMutation'
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
    put:
      operationId: carrito_cart_update
      description: Actualiza la cantidad de un ítem en el carrito.
      tags:
      - carrito
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemMutation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CartItemMutation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CartItemMutation'
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
    delete:
      operationId: carrito_cart_destroy
      description: Elimina un ítem del carrito o vacía todo el carrito.
      tags:
      - carrito
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
  /api/carrito/cart/items/{item_id}/:
    get:
      operationId: carrito_cart_items_retrieve
      description: Recupera el carrito actual o crea uno anónimo.
      parameters:
      - in: path
        name: item_id
        schema:
          type: integer
        required: true
      tags:
      - carrito
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
    post:
      operationId: carrito_cart_items_create
      description: Añade un producto al carrito.
      parameters:
      - in: path
        name: item_id
        schema:
          type: integer
        required: true
      tags:
      - carrito
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemMutation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CartItemMutation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CartItemMutation'
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
    put:
      operationId: carrito_cart_items_update
      description: Actualiza la cantidad de un ítem en el carrito.
      parameters:
      - in: path
        name: item_id
        schema:
          type: integer
        required: true
      tags:
      - carrito
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemMutation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CartItemMutation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CartItemMutation'
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
    delete:
      operationId: carrito_cart_items_destroy
      description: Elimina un ítem del carrito o vacía todo el carrito.
      parameters:
      - in: path
        name: item_id
        schema:
          type: integer
        required: true
      tags:
      - carrito
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
  /api/cuentas/admin/users/:
    get:
      operationId: cuentas_admin_users_list
      description: 'Administración: lista todos los usuarios.'
      parameters:
      - name: search
        required: false
        in: query
        description: Un término de búsqueda.
        schema:
          type: string
      tags:
      - cuentas
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminUser'
          description: ''
    post:
      operationId: cuentas_admin_users_create
      description: 'Administración: lista todos los usuarios.'
      tags:
      - cuentas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUser'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminUser'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminUser'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
          description: ''
  /api/cuentas/admin/users/{id}/:
    get:
      operationId: cuentas_admin_users_retrieve
      description: 'Administración: detalle, edición y eliminación de usuarios.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - cuentas
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserDetail'
          description: ''
    put:
      operationId: cuentas_admin_users_update
      description: 'Administración: detalle, edición y eliminación de usuarios.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - cuentas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUser'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminUser'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminUser'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
          description: ''
    patch:
      operationId: cuentas_admin_users_partial_update
      description: 'Administración: detalle, edición y eliminación de usuarios.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - cuentas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAdminUser'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAdminUser'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAdminUser'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
          description: ''
    delete:
      operationId: cuentas_admin_users_destroy
      description: 'Administración: detalle, edición y eliminación de usuarios.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - cuentas
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/cuentas/cambiar-contrasena/:
    post:
      operationId: cuentas_cambiar_contrasena_create
      description: Cambia la contraseña del usuario autenticado.
      tags:
      - cuentas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChange'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordChange'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordChange'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
  /api/cuentas/logout/:
    post:
      operationId: cuentas_logout_create
      description: Registra un logout del usuario.
      tags:
      - cuentas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageResponse'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MessageResponse'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MessageResponse'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
  /api/cuentas/perfil/:
    get:
      operationId: cuentas_perfil_retrieve
      description: Obtiene y actualiza el perfil del usuario autenticado.
      tags:
      - cuentas
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomUser'
          description: ''
    put:
      operationId: cuentas_perfil_update
      description: Obtiene y actualiza el perfil del usuario autenticado.
      tags:
      - cuentas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomUser'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomUser'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomUser'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomUser'
          description: ''
    patch:
      operationId: cuentas_perfil_partial_update
      description: Obtiene y actualiza el perfil del usuario autenticado.
      tags:
      - cuentas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCustomUser'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCustomUser'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCustomUser'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomUser'
          description: ''
    delete:
      operationId: cuentas_perfil_destroy
      description: Obtiene y actualiza el perfil del usuario autenticado.
      tags:
      - cuentas
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/cuentas/registro/:
    post:
      operationId: cuentas_registro_create
      description: Registra un nuevo usuario.
      tags:
      - cuentas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistration'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistration'
          description: ''
  /api/cuentas/restablecer-contrasena/confirmar/:
    post:
      operationId: cuentas_restablecer_contrasena_confirmar_create
      description: Confirma el restablecimiento de contraseña con token.
      tags:
      - cuentas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
  /api/cuentas/restablecer-contrasena/solicitar/:
    post:
      operationId: cuentas_restablecer_contrasena_solicitar_create
      description: Solicita un correo para restablecimiento de contraseña.
      tags:
      - cuentas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
  /api/cuentas/token/:
    post:
      operationId: cuentas_token_create
      description: |-
        Login personalizado que incluye:
        - Tokens JWT
        - Datos del usuario
        - Fusión de carrito anónimo
      tags:
      - cuentas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/cuentas/token/refresh/:
    post:
      operationId: cuentas_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - cuentas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/cuentas/token/verify/:
    post:
      operationId: cuentas_token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
      - cuentas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerify'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenVerify'
          description: ''
  /api/pedidos/admin/orders/:
    get:
      operationId: pedidos_admin_orders_list
      description: Lista todos los pedidos (solo admin).
      tags:
      - pedidos
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
          description: ''
  /api/pedidos/admin/stats/:
    get:
      operationId: pedidos_admin_stats_retrieve
      description: Retorna estadísticas de ventas para el dashboard admin.
      tags:
      - pedidos
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardStatsResponse'
          description: ''
  /api/pedidos/create-payment-intent/:
    post:
      operationId: pedidos_create_payment_intent_create
      description: Crea un PaymentIntent en Stripe para iniciar el checkout.
      tags:
      - pedidos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentIntentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreatePaymentIntentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreatePaymentIntentRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePaymentIntentResponse'
          description: ''
  /api/pedidos/my-orders/:
    get:
      operationId: pedidos_my_orders_list
      description: Lista los pedidos del usuario autenticado.
      tags:
      - pedidos
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
          description: ''
  /api/pedidos/webhook/:
    post:
      operationId: pedidos_webhook_create
      description: Endpoint de webhook de Stripe para procesar eventos de pago.
      tags:
      - pedidos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StripeWebhookPayload'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StripeWebhookPayload'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StripeWebhookPayload'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
        '400':
          description: No response body
  /api/productos/admin/categorias/:
    get:
      operationId: productos_admin_categorias_list
      description: 'Admin: lista y crea categorías.'
      parameters:
      - name: page
        required: false
        in: query
        description: Un número de página dentro del conjunto de resultados paginado.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Número de resultados a devolver por página.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Un término de búsqueda.
        schema:
          type: string
      tags:
      - productos
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategoriaList'
          description: ''
    post:
      operationId: productos_admin_categorias_create
      description: 'Admin: lista y crea categorías.'
      tags:
      - productos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Categoria'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Categoria'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Categoria'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Categoria'
          description: ''
  /api/productos/admin/categorias/{slug}/:
    get:
      operationId: productos_admin_categorias_retrieve
      description: 'Admin: ve, edita y elimina categorías.'
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - productos
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Categoria'
          description: ''
    put:
      operationId: productos_admin_categorias_update
      description: 'Admin: ve, edita y elimina categorías.'
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - productos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Categoria'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Categoria'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Categoria'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Categoria'
          description: ''
    patch:
      operationId: productos_admin_categorias_partial_update
      description: 'Admin: ve, edita y elimina categorías.'
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - productos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCategoria'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCategoria'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCategoria'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Categoria'
          description: ''
    delete:
      operationId: productos_admin_categorias_destroy
      description: 'Admin: ve, edita y elimina categorías.'
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - productos
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/productos/admin/imagenes/:
    get:
      operationId: productos_admin_imagenes_list
      description: 'Admin: lista y crea (sube) imágenes.'
      parameters:
      - name: page
        required: false
        in: query
        description: Un número de página dentro del conjunto de resultados paginado.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Número de resultados a devolver por página.
        schema:
          type: integer
      tags:
      - productos
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedImagenProductoAdminList'
          description: ''
    post:
      operationId: productos_admin_imagenes_create
      description: 'Admin: lista y crea (sube) imágenes.'
      tags:
      - productos
      requestBody:
        content:
          multipart/form-data:
